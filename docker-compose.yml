services:
  cmdfinder-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cmdfinder-mcp
    ports:
      - "${MCP_PORT:-9008}:${MCP_PORT:-9008}"
    env_file:
      - .env
    volumes:
      - ./faiss_index:/app/faiss_index
      - ./logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${MCP_PORT:-9008}/sse"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

